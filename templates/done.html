<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Submitted</title>
<link rel="icon" href="__BASE_URL__/favicon.ico" type="image/x-icon">
<meta name="theme-color" content="#0a0e1a">
<meta name="color-scheme" content="dark">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #131a2c;
  --border: #1f2940;
  --text: #e6e8ee;
  --text-soft: #c8d0dc;
  --text-dim: #94a0b3;
  --brand: #8b7cff;
  --success: #10b981;
  --success-soft: rgba(16, 185, 129, 0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background:
    radial-gradient(800px 400px at 50% 20%, rgba(139, 124, 255, 0.08), transparent 60%),
    var(--bg);
  color: var(--text-soft);
  min-height: 100vh;
  line-height: 1.55;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}
.card {
  max-width: 480px;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 40px 28px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  animation: enter 360ms cubic-bezier(0.2, 0.7, 0.3, 1);
}
.check-wrap {
  width: 72px;
  height: 72px;
  margin: 0 auto 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--success-soft);
  border: 1px solid rgba(16, 185, 129, 0.35);
  border-radius: 50%;
  position: relative;
}
.check-wrap::before {
  content: "";
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(16, 185, 129, 0.18), transparent 70%);
  animation: pulse 2.4s ease-in-out infinite;
}
.check {
  width: 36px;
  height: 36px;
  position: relative;
  z-index: 1;
}
.check svg { width: 100%; height: 100%; stroke-dasharray: 80; stroke-dashoffset: 80; animation: draw 600ms 220ms ease forwards; }
h1 {
  color: var(--text);
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}
p#msg {
  color: var(--text-dim);
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.result {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 22px;
  padding: 10px 20px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 14px;
}
.result.pass {
  background: linear-gradient(135deg, rgba(16, 185, 129, 0.12), rgba(16, 185, 129, 0.05));
  border: 1px solid rgba(16, 185, 129, 0.4);
  color: #34d399;
}
.result.pass::before { content: "✓"; font-size: 16px; }
.result.fail {
  background: linear-gradient(135deg, rgba(248, 113, 113, 0.12), rgba(248, 113, 113, 0.05));
  border: 1px solid rgba(248, 113, 113, 0.4);
  color: #f87171;
}
.result.fail::before { content: "✕"; font-size: 16px; }
.hint {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 13px;
  line-height: 1.5;
}
.hint strong { color: var(--text-soft); font-weight: 600; }
.retry {
  margin-top: 18px;
  color: var(--text-soft);
  font-size: 14px;
  line-height: 1.6;
}
.retry strong { color: var(--text); font-weight: 700; }
.retry-btn {
  display: inline-block;
  margin-top: 14px;
  padding: 10px 22px;
  background: var(--brand);
  color: #fff;
  text-decoration: none;
  border-radius: 10px;
  font-weight: 600;
  font-size: 14px;
}
.retry-btn:hover { filter: brightness(1.08); }
.retry-btn.disabled { opacity: 0.55; pointer-events: none; }

@keyframes enter {
  from { opacity: 0; transform: translateY(8px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes draw {
  to { stroke-dashoffset: 0; }
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.06); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
  .check svg { stroke-dashoffset: 0; }
}
</style>
</head>
<body>
<main class="card" role="status" aria-live="polite">
  <div class="check-wrap" aria-hidden="true">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12.5 L10 18 L20 6"/>
      </svg>
    </div>
  </div>
  <h1 id="title">Thanks — you're all set!</h1>
  <p id="msg">Your response has been recorded.</p>
  <div id="result" style="display:none;" class="result"></div>
  <div id="retry" class="retry" style="display:none;"></div>
  <div class="hint">Server roles update automatically — please allow <strong>up to a minute</strong> for changes to appear.</div>
</main>
<script>
const params = new URLSearchParams(location.search);
const result = params.get('result');
if (result === 'pass' || result === 'fail') {
  const el = document.getElementById('result');
  el.textContent = result === 'pass' ? 'Passed' : 'Not passed';
  el.classList.add(result);
  el.style.display = 'inline-flex';
}
const customMsg = params.get('msg');
if (customMsg) document.getElementById('msg').textContent = customMsg;

// Retry hint: shown when the submit handler decided another attempt is still
// possible (it omits these params after a locked-in pass). `left` is the
// remaining attempt count (omitted when unlimited); `next` is an RFC3339
// timestamp the next attempt unlocks at.
function fmtDuration(ms) {
  let s = Math.max(0, Math.ceil(ms / 1000));
  const d = Math.floor(s / 86400); s -= d * 86400;
  const h = Math.floor(s / 3600); s -= h * 3600;
  const m = Math.floor(s / 60); s -= m * 60;
  if (d > 0) return d + 'd ' + h + 'h';
  if (h > 0) return h + 'h ' + m + 'm';
  if (m > 0) return m + 'm ' + s + 's';
  return s + 's';
}
(function () {
  const left = params.get('left');
  const next = params.get('next');
  const slug = params.get('slug');
  if (left === null && !next) return;
  const box = document.getElementById('retry');
  const leftN = left === null ? null : parseInt(left, 10);
  if (leftN === 0) {
    box.innerHTML = "<strong>That was your last attempt.</strong>";
    box.style.display = 'block';
    return;
  }
  let html = '';
  if (leftN === null) html = 'You can try again any time.';
  else html = 'You have <strong>' + leftN + '</strong> attempt' + (leftN === 1 ? '' : 's') + ' left.';
  const formUrl = slug ? ('__BASE_URL__/f/' + encodeURIComponent(slug)) : null;
  html += '<div id="retry-when"></div>';
  if (formUrl) html += '<a id="retry-btn" class="retry-btn" href="' + formUrl + '">Try again</a>';
  box.innerHTML = html;
  box.style.display = 'block';

  const whenEl = document.getElementById('retry-when');
  const btn = document.getElementById('retry-btn');
  const until = next ? new Date(next).getTime() : 0;
  if (until && until > Date.now()) {
    const tick = () => {
      const remain = until - Date.now();
      if (remain <= 0) {
        clearInterval(timer);
        if (whenEl) whenEl.textContent = '';
        if (btn) btn.classList.remove('disabled');
        return;
      }
      if (whenEl) whenEl.textContent = 'Next attempt available in ' + fmtDuration(remain) + '.';
      if (btn) btn.classList.add('disabled');
    };
    tick();
    const timer = setInterval(tick, 1000);
  }
})();
</script>
</body>
</html>
