name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same branch when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --all-targets
        run: cargo clippy --all-targets --no-deps -- -D warnings

  test:
    name: tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --all-targets --no-fail-fast

  # cargo-audit checks Cargo.lock against the RustSec advisory database.
  # Runs on a separate schedule too so we hear about new advisories without
  # needing a code push.
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # audit-check posts results as a check run, which needs checks:write.
    # issues:write lets it open advisory issues on scheduled/main runs.
    permissions:
      checks: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2023-0071: Marvin Attack timing side-channel in `rsa`.
          # Pulled in transitively by sqlx-macros-core (which unconditionally
          # depends on sqlx-mysql for SQL parsing in query! macros), not by
          # our runtime code — we only enable sqlx's `postgres` feature, so
          # MySQL handshake / RSA crypto is never executed. No upstream fix
          # is available from the rsa crate. Revisit when sqlx 0.9 ships or
          # rsa publishes a constant-time release.
          ignore: RUSTSEC-2023-0071
